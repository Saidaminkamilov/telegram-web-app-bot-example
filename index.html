<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DT Men's Clothing</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #17212b;
            color: #f5f5f5;
            margin: 0;
            padding: 15px;
            text-align: center;
        }
        h1 { font-size: 22px; margin-bottom: 20px; }
        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 80px;
        }
        .product-card {
            background: #202b36;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .product-icon { font-size: 36px; margin-bottom: 10px; }
        .product-title { font-size: 14px; font-weight: 600; margin-bottom: 5px; min-height: 35px; }
        .product-price { color: #5288c1; font-weight: bold; font-size: 16px; margin-bottom: 12px; }
        .btn {
            background-color: #5288c1;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-active {
            background-color: #e53e3e;
        }
    </style>
</head>
<body>

    <h1>DT Men's Clothing</h1>
    <div class="products-grid" id="catalog"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const products = [
            { id: 1, title: "Футболка Oversize", price: 1500 },
            { id: 2, title: "Худи Premium", price: 3200 },
            { id: 3, title: "Джинсы Карго", price: 2800 },
            { id: 4, title: "Куртка Бомбер", price: 4500 }
        ];

        let cart = [];

        function render() {
            const html = products.map(p => {
                const inCart = cart.includes(p.id);
                return `
                    <div class="product-card">
                        <div class="product-icon">👕</div>
                        <div class="product-title">${p.title}</div>
                        <div class="product-price">${p.price} ₽</div>
                        <button class="btn ${inCart ? 'btn-active' : ''}" onclick="toggleCart(${p.id})">
                            ${inCart ? 'Убрать' : 'В корзину'}
                        </button>
                    </div>
                `;
            }).join('');
            document.getElementById('catalog').innerHTML = html;
            updateButton();
        }

        function toggleCart(id) {
            if (cart.includes(id)) {
                cart = cart.filter(item => item !== id);
            } else {
                cart.push(id);
            }
            render();
        }

        function updateButton() {
            if (cart.length > 0) {
                let total = 0;
                let items = [];
                cart.forEach(id => {
                    const p = products.find(prod => prod.id === id);
                    total += p.price;
                    items.push(`${p.title} (${p.price} ₽)`);
                });
                tg.MainButton.text = `Оформить заказ: ${total} ₽`;
                tg.MainButton.show();
                
                tg.MainButton.offClick();
                tg.MainButton.onClick(() => {
                    tg.sendData(JSON.stringify({ info: "Заказ DT", items: items, total: total }));
                    tg.close();
                });
            } else {
                tg.MainButton.hide();
            }
        }

        render();
    </script>
</body>
</html>
