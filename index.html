<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DT Men's Clothing</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            margin: 0;
            padding: 15px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 80px;
        }
        .product-card {
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .product-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #ddd;
        }
        .product-title {
            font-size: 14px;
            font-weight: 600;
            margin: 8px 0 4px 0;
            height: 34px;
            overflow: hidden;
        }
        .product-price {
            color: var(--tg-theme-link-color, #2481cc);
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .btn {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-remove {
            background-color: #e53e3e;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>DT Men's Clothing</h1>
    </div>

    <div class="products-grid" id="catalog"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // СПИСОК ТОВАРОВ (Можно добавлять сколько угодно копируя блоки)
        const products = [
            { id: 1, title: "Черная футболка Oversize", price: 1500, img: "https://placehold.co" },
            { id: 2, title: "Худи с капюшоном", price: 3200, img: "https://placehold.co" },
            { id: 3, title: "Джинсы Карго", price: 2800, img: "https://placehold.co" },
            { id: 4, title: "Куртка Бомбер", price: 4500, img: "https://placehold.co" }
        ];

        let cart = {};

        function renderCatalog() {
            const catalogHtml = products.map(p => `
                <div class="product-card">
                    <img class="product-img" src="${p.img}" alt="${p.title}">
                    <div class="product-title">${p.title}</div>
                    <div class="product-price">${p.price} ₽</div>
                    <button class="btn ${cart[p.id] ? 'btn-remove' : ''}" onclick="toggleCart(${p.id})">
                        ${cart[p.id] ? 'Убрать' : 'В корзину'}
                    </button>
                </div>
            `).join('');
            document.getElementById('catalog').innerHTML = catalogHtml;
            updateMainButton();
        }

        function toggleCart(id) {
            if (cart[id]) {
                delete cart[id];
            } else {
                cart[id] = 1;
            }
            renderCatalog();
        }

        function updateMainButton() {
            const itemCount = Object.keys(cart).length;
            if (itemCount > 0) {
                let totalPrice = 0;
                let itemsText = [];
                
                Object.keys(cart).forEach(id => {
                    const product = products.find(p => p.id == id);
                    totalPrice += product.price;
                    itemsText.push(`${product.title} (${product.price} ₽)`);
                });

                tg.MainButton.text = `Оформить заказ: ${totalPrice} ₽`;
                tg.MainButton.show();
                
                tg.MainButton.onClick(() => {
                    // Отправка данных заказа обратно в чат бота
                    const orderData = {
                        info: "Новый заказ в DT Men's Clothing!",
                        items: itemsText,
                        total: totalPrice
                    };
                    tg.sendData(JSON.stringify(orderData));
                    tg.close();
                });
            } else {
                tg.MainButton.hide();
            }
        }

        renderCatalog();
    </script>
</body>
</html>
