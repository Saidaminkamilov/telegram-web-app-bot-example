<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DT Men's Clothing</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #17212b;
            color: #f5f5f5;
            margin: 0;
            padding: 15px;
            text-align: center;
        }
        h1 { font-size: 22px; margin-bottom: 20px; }
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding-bottom: 30px;
        }
        .product-card {
            background-color: #24303f;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .product-card img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .product-title { font-size: 18px; font-weight: bold; margin: 10px 0; }
        .product-sizes { font-size: 14px; color: #708499; margin-bottom: 15px; }
        .buy-btn {
            background-color: #2ea6ff;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }
        .buy-btn:hover { background-color: #1a91e6; }
    </style>
</head>
<body>

    <h1>Коллекция Richttag</h1>

    <div class="products-grid">
        <!-- Товар 1 -->
        <div class="product-card">
            <img src="ChristianDior.jpg" alt="Christian Dior">
            <div class="product-title">Christian Dior (Вид 1)</div>
            <div class="product-sizes">Размеры: 38 - 45</div>
            <button class="buy-btn" onclick="buyItem('Christian Dior Вид 1')">Купить в 1 клик</button>
        </div>

        <!-- Товар 2 -->
        <div class="product-card">
            <img src="ChristianDior1.jpg" alt="Christian Dior">
            <div class="product-title">Christian Dior (Вид 2)</div>
            <div class="product-sizes">Размеры: 38 - 45</div>
            <button class="buy-btn" onclick="buyItem('Christian Dior Вид 2')">Купить в 1 клик</button>
        </div>

        <!-- Товар 3 -->
        <div class="product-card">
            <img src="ChristianDior2.jpg" alt="Christian Dior">
            <div class="product-title">Christian Dior (Вид 3)</div>
            <div class="product-sizes">Размеры: 38 - 45</div>
            <button class="buy-btn" onclick="buyItem('Christian Dior Вид 3')">Купить в 1 клик</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function buyItem(productCode) {
            const safeCode = productCode.replace(/\s+/g, '_');
            tg.close();
            tg.openTelegramLink('https://t.me' + safeCode);
        }
    </script>
</body>
</html>
